name: Pipeline Infraestructura

on:
  workflow_dispatch:

# Restricción de permisos para corregir el fallo CKV2_GHA_1 de Checkov
permissions:
  contents: read

jobs:
  tflint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Ejecutar TFLint
        run: |
          tflint --init
          tflint

  checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar Checkov
        run: pip install checkov

      - name: Ejecutar Checkov
        if: always()
        run: checkov -d . --skip-check CKV2_AWS_12

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Inicializar Terraform
        run: terraform init

      - name: Validar Terraform
        run: terraform validate